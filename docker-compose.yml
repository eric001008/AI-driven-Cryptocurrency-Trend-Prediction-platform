version: '3.8'

services:
  db:
    image: timescale/timescaledb:2.11.2-pg13
    restart: always
    env_file:
      - .env
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  data_acquisition:
    build: ./data_acquisition
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./telegram_session:/app/telegram_session
      
  data_cleansing:
    build: ./data_cleansing
    depends_on:
      - db
    env_file:
      - .env

  data_analysis:
    container_name: data_analysis
    build: ./data_analysis
    depends_on:
      - db
    env_file:
      - .env

  data_gateway:
    build: ./data_gateway
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - .env

  db_seed:
    build: ./db_seed
    depends_on:
      - db
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - db

  survey_service:
    build:
      context: ./survey_service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  login_service:
    build: ./login
    ports:
      - "5001:5001"
    depends_on:
      - db
    env_file:
      - .env
    #environment:
      #- ENV_MODE=test