name: Run React Tests

on:     #Trigger conditions is push and pull_request.
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run tests
        run: npm test -- --watchAll=false  # Start the test program
        working-directory: ./frontend
 